<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundMaster - Áudio Sincronizado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(30,30,35,0.95);
            border-radius: 16px;
            border: 1px solid #d4af37;
            padding: 20px;
        }
        h1 { text-align: center; color: #d4af37; font-size: 24px; margin-bottom: 5px; }
        .sub { text-align: center; color: #888; font-size: 12px; margin-bottom: 20px; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
            background: #4a6a8a;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: #3a3a3a;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary { background: #5d4723; }
        .btn-primary:hover { background: #7a5c30; }
        .btn-success { background: #2a5a2a; }
        .btn-success:hover { background: #3a7a3a; }
        .btn-danger { background: #6a2a2a; }
        .btn-danger:hover { background: #8a3a3a; }
        .btn-danger:disabled { background: #4a3a3a; cursor: not-allowed; }
        .btn:hover { transform: translateY(-1px); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #d4af37;
        }
        .modal-content h3 { margin-bottom: 20px; color: #d4af37; }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
        }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
        
        .sounds-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .sound-card {
            background: #252525;
            border-radius: 12px;
            padding: 12px;
            border-left: 4px solid #d4af37;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sound-checkbox { margin-top: 4px; }
        .sound-checkbox input { width: 18px; height: 18px; cursor: pointer; }
        .sound-content { flex: 1; }
        .sound-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .sound-name { font-weight: bold; font-size: 15px; color: #d4af37; }
        .sound-controls { display: flex; gap: 6px; }
        .control-btn {
            background: #3a3a3a;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .control-btn.play { background: #2a5a2a; }
        .control-btn.play.playing { background: #8a3a3a; }
        .control-btn.pause { background: #4a6a8a; }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #444;
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
        }
        .volume-value { font-size: 11px; color: #d4af37; min-width: 40px; text-align: right; }
        .sound-url { font-size: 10px; color: #666; margin-top: 6px; word-break: break-all; font-family: monospace; }
        .no-sounds { text-align: center; color: #666; padding: 40px; }
        .delete-bar { margin-bottom: 15px; display: flex; justify-content: flex-end; }
        .status-info {
            text-align: center;
            font-size: 11px;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #444;
        }
        .sync-on {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2a5a2a;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        .sync-off {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8a3a3a;
            margin-right: 6px;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.8); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 SoundMaster</h1>
    <div class="sub">Áudio sincronizado para toda a mesa</div>

    <div style="text-align: center;">
        <span id="roleBadge" class="badge">🔌 Conectando...</span>
    </div>

    <div class="action-bar">
        <button class="btn btn-primary" id="btnAddSound">➕ Adicionar Som</button>
        <button class="btn btn-success" id="btnExportList">💾 Exportar</button>
        <button class="btn" id="btnImportList">📂 Importar</button>
        <input type="file" id="importFileInput" accept=".json" style="display: none;">
    </div>
    <div class="delete-bar">
        <button class="btn btn-danger" id="btnDeleteSelected" disabled>🗑️ Excluir Selecionados</button>
    </div>

    <div id="soundsContainer" class="sounds-list">
        <div class="no-sounds">📢 Nenhum som disponível. Clique em "Adicionar Som" para começar.</div>
    </div>

    <div class="status-info">
        <span id="syncIndicator" class="sync-off"></span>
        <span id="syncStatus">Aguardando conexão...</span>
    </div>
</div>

<!-- Modal -->
<div id="soundModal" class="modal">
    <div class="modal-content">
        <h3>➕ Adicionar Som</h3>
        <input type="text" id="soundName" placeholder="Nome do som">
        <input type="text" id="soundUrl" placeholder="URL do áudio (MP3)">
        <div class="modal-buttons">
            <button class="btn" id="btnCancelModal">Cancelar</button>
            <button class="btn btn-primary" id="btnConfirmModal">Adicionar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDLzqmIVK3AyExjc4hr6Jht4tLUnbHkCoE",
        authDomain: "soundmaster-be84c.firebaseapp.com",
        databaseURL: "https://soundmaster-be84c-default-rtdb.firebaseio.com",
        projectId: "soundmaster-be84c",
        storageBucket: "soundmaster-be84c.firebasestorage.app",
        appId: "1:290185604308:web:4d9ab0d246569a72629f41"
    };

    console.log("🚀 Inicializando SoundMaster...");
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    const SALA_ID = "soundmaster_sala_principal";
    let userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 4);
    let sounds = [];
    let audioElements = {};
    let syncTimeout = null;
    
    // Elementos DOM
    const roleBadge = document.getElementById('roleBadge');
    const syncIndicator = document.getElementById('syncIndicator');
    const syncStatus = document.getElementById('syncStatus');
    const soundsContainer = document.getElementById('soundsContainer');
    const btnAddSound = document.getElementById('btnAddSound');
    const btnExportList = document.getElementById('btnExportList');
    const btnImportList = document.getElementById('btnImportList');
    const btnDeleteSelected = document.getElementById('btnDeleteSelected');
    const importFileInput = document.getElementById('importFileInput');
    const soundModal = document.getElementById('soundModal');
    const btnCancelModal = document.getElementById('btnCancelModal');
    const btnConfirmModal = document.getElementById('btnConfirmModal');
    const soundNameInput = document.getElementById('soundName');
    const soundUrlInput = document.getElementById('soundUrl');
    
    // =========================================
    // FUNÇÕES DE SINCRONIZAÇÃO DE COMANDOS
    // =========================================
    
    function salvarSoundsNoFirebase() {
        if (syncTimeout) clearTimeout(syncTimeout);
        syncTimeout = setTimeout(() => {
            const soundsRef = ref(db, `${SALA_ID}/sounds`);
            const dataToSave = sounds.map(s => ({
                id: s.id,
                nome: s.nome,
                url: s.url,
                volume: s.volume
            }));
            set(soundsRef, dataToSave).catch(console.error);
        }, 500);
    }
    
    // Enviar comando de áudio para todos
    function enviarComando(tipo, soundId, valor = null) {
        const comandosRef = ref(db, `${SALA_ID}/comandos`);
        push(comandosRef, {
            tipo: tipo,
            soundId: soundId,
            valor: valor,
            enviadoPor: userId,
            timestamp: Date.now()
        }).catch(console.error);
        console.log(`📡 Comando enviado: ${tipo} - ${soundId}`);
    }
    
    // Executar comando recebido
    function executarComando(comando) {
        console.log(`📡 Comando recebido: ${comando.tipo} - ${comando.soundId} de ${comando.enviadoPor}`);
        
        const sound = sounds.find(s => s.id === comando.soundId);
        if (!sound) return;
        
        switch(comando.tipo) {
            case 'play':
                playSoundSync(comando.soundId);
                break;
            case 'pause':
                pauseSoundSync(comando.soundId);
                break;
            case 'stop':
                stopSoundSync(comando.soundId);
                break;
            case 'volume':
                setVolumeSync(comando.soundId, comando.valor);
                break;
        }
    }
    
    function playSoundSync(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        let audio = audioElements[id];
        if (!audio) {
            audio = new Audio(sound.url);
            audio.volume = sound.volume || 0.7;
            audio.onended = () => {
                const s = sounds.find(s2 => s2.id === id);
                if (s) {
                    s.playing = false;
                    renderizar();
                }
            };
            audioElements[id] = audio;
        }
        
        audio.currentTime = sound.currentTime || 0;
        audio.play().catch(e => console.warn('Erro ao reproduzir:', e));
        sound.playing = true;
        renderizar();
    }
    
    function pauseSoundSync(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            sound.currentTime = audio.currentTime;
        }
        sound.playing = false;
        renderizar();
    }
    
    function stopSoundSync(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        sound.currentTime = 0;
        sound.playing = false;
        renderizar();
    }
    
    function setVolumeSync(id, volume) {
        const sound = sounds.find(s => s.id === id);
        if (sound) sound.volume = volume;
        
        const audio = audioElements[id];
        if (audio) audio.volume = volume;
        
        renderizar();
    }
    
    // Escutar comandos do Firebase
    function escutarComandos() {
        const comandosRef = ref(db, `${SALA_ID}/comandos`);
        
        onValue(comandosRef, (snapshot) => {
            const comandos = snapshot.val();
            if (!comandos) return;
            
            // Pegar o último comando
            const comandosList = Object.values(comandos);
            const ultimoComando = comandosList[comandosList.length - 1];
            
            // Se o comando não foi enviado por mim, executa
            if (ultimoComando && ultimoComando.enviadoPor !== userId) {
                executarComando(ultimoComando);
            }
            
            // Limpar comandos antigos (manter últimos 30)
            const keys = Object.keys(comandos);
            if (keys.length > 30) {
                const toRemove = keys.slice(0, keys.length - 30);
                toRemove.forEach(key => {
                    set(ref(db, `${SALA_ID}/comandos/${key}`), null);
                });
            }
        }, (error) => {
            console.error("❌ Erro ao escutar comandos:", error);
        });
    }
    
    // Escutar mudanças na lista de sons
    function escutarSounds() {
        const soundsRef = ref(db, `${SALA_ID}/sounds`);
        
        onValue(soundsRef, (snapshot) => {
            const data = snapshot.val();
            console.log("📡 Lista de sons recebida:", data);
            
            if (data && Array.isArray(data)) {
                const novosSounds = data.map(s => ({ ...s, playing: false, currentTime: 0 }));
                for (const novo of novosSounds) {
                    const existente = sounds.find(s => s.id === novo.id);
                    if (existente) {
                        novo.playing = existente.playing;
                        novo.currentTime = existente.currentTime;
                    }
                }
                sounds = novosSounds;
                renderizar();
                syncIndicator.className = "sync-on";
                syncStatus.innerHTML = "Sincronizado! " + sounds.length + " sons";
                roleBadge.innerHTML = "🎧 SoundMaster - " + sounds.length + " sons";
            } else if (data && typeof data === 'object') {
                const soundArray = Object.values(data);
                sounds = soundArray.map(s => ({ ...s, playing: false, currentTime: 0 }));
                renderizar();
                syncIndicator.className = "sync-on";
                syncStatus.innerHTML = "Sincronizado! " + sounds.length + " sons";
                roleBadge.innerHTML = "🎧 SoundMaster - " + sounds.length + " sons";
            } else {
                sounds = [];
                renderizar();
                syncStatus.innerHTML = "Conectado. Nenhum som ainda.";
                roleBadge.innerHTML = "🎧 SoundMaster - Pronto!";
            }
        }, (error) => {
            console.error("❌ Erro ao escutar sons:", error);
            syncIndicator.className = "sync-off";
            syncStatus.innerHTML = "Erro: " + error.message;
            roleBadge.innerHTML = "⚠️ Erro: " + error.message;
        });
    }
    
    // =========================================
    // FUNÇÕES DE ÁUDIO (com envio de comandos)
    // =========================================
    
    function renderizar() {
        if (sounds.length === 0) {
            soundsContainer.innerHTML = '<div class="no-sounds">📢 Nenhum som disponível. Clique em "Adicionar Som" para começar.</div>';
            btnDeleteSelected.disabled = true;
            return;
        }

        let html = '';
        for (const s of sounds) {
            const playBtnClass = s.playing ? 'play playing' : 'play';
            const playBtnText = s.playing ? '⏹️' : '▶️';
            const volumePercent = Math.round((s.volume || 0.7) * 100);
            
            html += `
                <div class="sound-card" data-id="${s.id}">
                    <div class="sound-checkbox">
                        <input type="checkbox" class="sound-select" data-id="${s.id}">
                    </div>
                    <div class="sound-content">
                        <div class="sound-header">
                            <div class="sound-name">${escapeHtml(s.nome)}</div>
                            <div class="sound-controls">
                                <button class="control-btn ${playBtnClass}" data-action="play" data-id="${s.id}">${playBtnText}</button>
                                <button class="control-btn pause" data-action="pause" data-id="${s.id}">⏸️</button>
                            </div>
                        </div>
                        <div class="volume-control">
                            <span>🔊</span>
                            <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="${s.volume || 0.7}" data-action="volume" data-id="${s.id}">
                            <span class="volume-value">${volumePercent}%</span>
                        </div>
                        <div class="sound-url">${escapeHtml(s.url.length > 60 ? s.url.substring(0, 60) + '...' : s.url)}</div>
                    </div>
                </div>
            `;
        }
        soundsContainer.innerHTML = html;
        
        document.querySelectorAll('[data-action="play"]').forEach(btn => {
            btn.onclick = () => togglePlay(btn.getAttribute('data-id'));
        });
        
        document.querySelectorAll('[data-action="pause"]').forEach(btn => {
            btn.onclick = () => pauseSound(btn.getAttribute('data-id'));
        });
        
        document.querySelectorAll('[data-action="volume"]').forEach(slider => {
            slider.oninput = (e) => {
                const id = slider.getAttribute('data-id');
                const value = parseFloat(slider.value);
                const volSpan = slider.parentElement.querySelector('.volume-value');
                if (volSpan) volSpan.textContent = Math.round(value * 100) + '%';
                setVolume(id, value);
            };
        });
        
        document.querySelectorAll('.sound-select').forEach(cb => {
            cb.onchange = () => atualizarBotaoExcluir();
        });
        atualizarBotaoExcluir();
    }
    
    function atualizarBotaoExcluir() {
        const selecionados = document.querySelectorAll('.sound-select:checked').length;
        btnDeleteSelected.disabled = selecionados === 0;
    }
    
    function addSound(nome, url) {
        if (!nome.trim() || !url.trim()) {
            alert('Preencha o nome e a URL!');
            return false;
        }
        
        let finalUrl = url;
        if (url.includes('dropbox.com') && !url.includes('dl.dropboxusercontent.com')) {
            finalUrl = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            if (!finalUrl.includes('?dl=1')) finalUrl += '?dl=1';
        }
        
        const newSound = {
            id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            nome: nome.trim(),
            url: finalUrl,
            playing: false,
            currentTime: 0,
            volume: 0.7
        };
        
        sounds.push(newSound);
        renderizar();
        salvarSoundsNoFirebase();
        return true;
    }
    
    function deleteSelected() {
        const selectedIds = [];
        document.querySelectorAll('.sound-select:checked').forEach(cb => {
            selectedIds.push(cb.getAttribute('data-id'));
        });
        
        if (selectedIds.length === 0) return;
        
        if (confirm(`Excluir ${selectedIds.length} som(ns)?`)) {
            selectedIds.forEach(id => {
                if (audioElements[id]) {
                    audioElements[id].pause();
                    audioElements[id].src = '';
                    delete audioElements[id];
                }
            });
            sounds = sounds.filter(s => !selectedIds.includes(s.id));
            renderizar();
            salvarSoundsNoFirebase();
        }
    }
    
    function togglePlay(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        if (sound.playing) {
            stopSound(id);
        } else {
            playSound(id);
        }
    }
    
    function playSound(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        let audio = audioElements[id];
        if (!audio) {
            audio = new Audio(sound.url);
            audio.volume = sound.volume || 0.7;
            audio.onended = () => {
                const s = sounds.find(s2 => s2.id === id);
                if (s) {
                    s.playing = false;
                    renderizar();
                }
            };
            audioElements[id] = audio;
        }
        
        audio.currentTime = sound.currentTime || 0;
        audio.play().catch(e => console.warn('Erro ao reproduzir:', e));
        sound.playing = true;
        renderizar();
        
        // Enviar comando para todos os outros dispositivos
        enviarComando('play', id);
    }
    
    function pauseSound(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            sound.currentTime = audio.currentTime;
        }
        sound.playing = false;
        renderizar();
        
        // Enviar comando para todos os outros dispositivos
        enviarComando('pause', id);
    }
    
    function stopSound(id) {
        const sound = sounds.find(s => s.id === id);
        if (!sound) return;
        
        const audio = audioElements[id];
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
        sound.currentTime = 0;
        sound.playing = false;
        renderizar();
        
        // Enviar comando para todos os outros dispositivos
        enviarComando('stop', id);
    }
    
    function setVolume(id, volume) {
        const sound = sounds.find(s => s.id === id);
        if (sound) sound.volume = volume;
        
        const audio = audioElements[id];
        if (audio) audio.volume = volume;
        
        salvarSoundsNoFirebase();
        enviarComando('volume', id, volume);
    }
    
    function exportar() {
        const data = sounds.map(s => ({
            nome: s.nome,
            url: s.url,
            volume: s.volume || 0.7
        }));
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `soundmaster_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert(`Playlist exportada com ${sounds.length} sons!`);
    }
    
    function importar(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    imported.forEach(item => {
                        if (item.nome && item.url) {
                            sounds.push({
                                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                                nome: item.nome,
                                url: item.url,
                                playing: false,
                                currentTime: 0,
                                volume: item.volume || 0.7
                            });
                        }
                    });
                    renderizar();
                    salvarSoundsNoFirebase();
                    alert(`Importados ${imported.length} sons!`);
                } else {
                    alert('Arquivo inválido: formato incorreto.');
                }
            } catch(err) {
                alert('Erro ao importar: ' + err.message);
            }
        };
        reader.readAsText(file);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // =========================================
    // EVENTOS E INICIALIZAÇÃO
    // =========================================
    
    function configurarEventos() {
        btnAddSound.onclick = () => {
            soundNameInput.value = '';
            soundUrlInput.value = '';
            soundModal.style.display = 'flex';
        };
        
        btnCancelModal.onclick = () => {
            soundModal.style.display = 'none';
        };
        
        btnConfirmModal.onclick = () => {
            const nome = soundNameInput.value.trim();
            const url = soundUrlInput.value.trim();
            if (addSound(nome, url)) {
                soundModal.style.display = 'none';
            }
        };
        
        btnExportList.onclick = exportar;
        
        btnImportList.onclick = () => importFileInput.click();
        
        btnDeleteSelected.onclick = deleteSelected;
        
        importFileInput.onchange = (e) => {
            if (e.target.files && e.target.files[0]) {
                importar(e.target.files[0]);
                importFileInput.value = '';
            }
        };
        
        soundModal.onclick = (e) => {
            if (e.target === soundModal) soundModal.style.display = 'none';
        };
    }
    
    function inicializar() {
        configurarEventos();
        
        roleBadge.innerHTML = "🎧 SoundMaster - Conectando...";
        
        // Iniciar escutas
        escutarSounds();
        escutarComandos();
        
        console.log("✅ SoundMaster inicializado!");
        console.log("📡 Sala:", SALA_ID);
        console.log("🆔 User ID:", userId);
    }
    
    inicializar();
</script>
</body>
</html>
